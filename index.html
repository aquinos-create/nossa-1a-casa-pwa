<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Nossa 1ª Casa</title>

  <style>
    :root {
      --petroleo: #114B5F;
      --petroleo-escuro: #0E3D4D;
      --petroleo-claro: #1B6B7A;
      --fundo: #F7F8FA;
      --branco: #FFFFFF;
      --dourado: #E8AE3A;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(
        145deg,
        var(--petroleo),
        var(--petroleo-escuro)
      );
      color: var(--branco);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .conteudo {
      max-width: 420px;
    }

    .icone {
      font-size: 70px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    p {
      margin: 10px 0 0;
      color: #D9E7EB;
      font-size: 17px;
      font-weight: 600;
    }

    .status {
      margin-top: 30px;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="conteudo">
    <div class="icone">🏠</div>

    <h1>Nossa 1ª Casa</h1>

    <p>Rumo à Quitação</p>

    <div class="status">
      Camada PWA em preparação
    </div>
  </main>
</body>
</html>
